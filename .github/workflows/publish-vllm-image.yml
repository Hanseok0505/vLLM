name: Publish vLLM Docker image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./vllm-docker
          push: true
          tags: |
            ghcr.io/${{ toLower(github.repository_owner) }}/vllm:latest
            ghcr.io/${{ toLower(github.repository_owner) }}/vllm:${{ github.sha }}
